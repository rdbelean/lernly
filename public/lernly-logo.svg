<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient — shifted to indigo to match new site -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A6CF7"/>
      <stop offset="50%" stop-color="#3B5CE0"/>
      <stop offset="100%" stop-color="#2845B8"/>
    </linearGradient>
    
    <!-- Star gradient — warm gold/amber -->
    <linearGradient id="starGrad" x1="340" y1="80" x2="400" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD76E"/>
      <stop offset="100%" stop-color="#F0A830"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  
  <!-- Three text lines (document icon) -->
  <!-- Line 1 — top, slightly shorter -->
  <rect x="120" y="195" width="272" height="32" rx="16" fill="white"/>
  
  <!-- Line 2 — middle, widest -->
  <rect x="120" y="260" width="290" height="32" rx="16" fill="white"/>
  
  <!-- Line 3 — bottom, shortest -->
  <rect x="120" y="325" width="240" height="32" rx="16" fill="white"/>
  
  <!-- 4-pointed star (AI sparkle) -->
  <g transform="translate(370, 130)">
    <!-- Main star -->
    <path d="M0,-42 C4,-14 14,-4 42,0 C14,4 4,14 0,42 C-4,14 -14,4 -42,0 C-14,-4 -4,-14 0,-42Z" fill="url(#starGrad)"/>
    <!-- Small dot top-right of star -->
    <circle cx="30" cy="-30" r="5" fill="url(#starGrad)"/>
  </g>
</svg>