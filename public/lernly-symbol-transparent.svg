<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="frontCardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#DDE2FF" stop-opacity="0.92"/>
    </linearGradient>

    <linearGradient id="backCardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8D0FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7A8AE8" stop-opacity="0.40"/>
    </linearGradient>

    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.30"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="rotate(-12 460 560)">
    <rect x="250" y="350" width="420" height="420" rx="72"
          fill="url(#backCardGradient)"
          stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <g transform="rotate(7 580 480)">
    <g filter="url(#cardShadow)">
      <rect x="360" y="260" width="440" height="440" rx="75" fill="url(#frontCardGradient)"/>
    </g>
    <rect x="430" y="428" width="300" height="38" rx="19" fill="#5566F5"/>
    <rect x="430" y="496" width="225" height="38" rx="19" fill="#5566F5"/>
    <circle cx="718" cy="630" r="44" fill="#5566F5"/>
    <path d="M 694 630 L 710 647 L 740 616"
          stroke="#FFFFFF" stroke-width="7"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>
